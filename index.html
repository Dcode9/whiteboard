<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebBoard by Dhairya</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Dcode9/whiteboard/dfcc6b7600fe1bf56dd763ea9715e9ad5363c227/WebBoard.png?v=2">
    
    <!-- GLOBAL ERROR HANDLER: Displays errors on screen to help debug blank deployments -->
    <script>
        window.onerror = function(msg, url, line, col, error) {
            var errorBox = document.getElementById('global-error-box');
            if (errorBox) {
                errorBox.style.display = 'block';
                errorBox.innerHTML += '<div><strong>Error:</strong> ' + msg + '<br><small>' + url + ':' + line + '</small></div><hr style="margin:5px 0;border-color:rgba(255,255,255,0.3)">';
            }
            console.error("Global Error:", msg, error);
            // Hide loading screen if error occurs so we can see the error
            var loader = document.getElementById('app-loading');
            if(loader) loader.style.display = 'none';
            return false;
        };
    </script>

    <!-- CRITICAL CSS: Inline styles for Loading Screen & Error Box (No Tailwind Dependency) -->
    <style>
        /* Spinner Animation */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Loading Overlay - Pure CSS to ensure it renders before external scripts */
        #app-loading {
            position: fixed;
            inset: 0;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #f3f4f6;
            z-index: 2147483647; /* Max Z-Index */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            color: #4b5563;
            transition: opacity 0.3s ease-out;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb; /* Light grey */
            border-top: 4px solid #3b82f6; /* Blue */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        /* Error Box Style */
        #global-error-box {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: #ef4444;
            color: white;
            padding: 1rem;
            z-index: 2147483648; /* Above loading screen */
            font-family: monospace;
            font-size: 14px;
            max-height: 50vh;
            overflow: auto;
            border-bottom: 2px solid #7f1d1d;
        }
    </style>

    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Check if Tailwind loaded
        window.onload = function() {
            if (!window.tailwind) {
                console.warn("Tailwind CSS failed to load via CDN.");
            }
        }
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    
    <style>
        /* Basic styles for a smooth experience */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent scrolling on body */
            overscroll-behavior: none; /* Prevents pull-to-refresh */
            background-color: #f3f4f6; /* Fallback bg */
        }
        
        /* View Management */
        .view {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        .view.active {
            display: block;
        }
        
        /* Canvas fills entire viewport with no offset */
        #whiteboard {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        /* Homepage styles */
        #homepage-view {
            overflow-y: auto;
            background-color: #f3f4f6;
        }
        
        /* Whiteboard view */
        #whiteboard-view {
            overflow: hidden;
        }
        
        /* Floating header containers - each is independent and floating */
        .floating-container {
            position: fixed;
            z-index: 100;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            padding: 12px 16px;
        }
        
        /* Logo container - top left */
        .header-logo-container {
            top: 16px;
            left: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        
        .header-logo-container img {
            height: 32px;
            width: 32px;
        }
        
        .header-logo-container span {
            font-size: 20px;
            font-weight: 600;
            color: #1f2937;
        }
        
        /* Search/Toolbar container - top center */
        .header-center-container {
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-search {
            padding: 8px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            min-width: 300px;
        }
        
        /* User account container - top right */
        .header-account-container {
            top: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
        }
        
        .user-profile:hover {
            background-color: #f3f4f6;
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #e5e7eb;
        }
        
        .user-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 200px;
            z-index: 1000;
        }
        
        .user-menu.active {
            display: block;
        }
        
        .user-menu button {
            width: 100%;
            text-align: left;
            padding: 12px 16px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
        }
        
        .user-menu button:hover {
            background-color: #f3f4f6;
        }
        
        .btn-primary {
            padding: 8px 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        
        .btn-primary:hover {
            background: #1d4ed8;
        }
        
        .dropdown {
            position: relative;
        }
        
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-width: 150px;
            z-index: 1000;
        }
        
        .dropdown-menu.active {
            display: block;
        }
        
        .dropdown-menu button {
            width: 100%;
            text-align: left;
            padding: 12px 16px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
        }
        
        .dropdown-menu button:hover {
            background-color: #f3f4f6;
        }
        
        /* Boards sections */
        .boards-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 24px 32px 24px; /* Added top padding for floating header */
        }
        
        .boards-section {
            margin-bottom: 48px;
        }
        
        .boards-section h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1f2937;
        }
        
        .boards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
        }
        
        .board-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .board-card:hover {
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        
        .board-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: #1f2937;
        }
        
        .board-card p {
            font-size: 14px;
            color: #6b7280;
            margin: 0;
        }
        
        .board-card-actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
        }
        
        .board-card-actions button {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            font-size: 13px;
        }
        
        .board-card-actions button:hover {
            background: #f3f4f6;
        }
        
        .board-card-actions .delete-btn {
            color: #dc2626;
            border-color: #dc2626;
        }

        .board-card-actions .rename-btn {
            color: #1d4ed8;
            border-color: #93c5fd;
        }

        .board-card-actions .rename-btn:hover {
            background: #eff6ff;
        }

        .board-card-actions .upload-btn {
            color: #047857;
            border-color: #6ee7b7;
        }

        .board-card-actions .upload-btn:hover {
            background: #ecfdf5;
        }
        
        .board-card-actions .delete-btn:hover {
            background: #fef2f2;
        }
        
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #6b7280;
        }
        
        /* Whiteboard view - show floating containers */
        #whiteboard-view.active .header-logo-container,
        #whiteboard-view.active .header-account-container {
            display: flex !important;
        }
        
        /* Toolbar in whiteboard view becomes the center container */
        #whiteboard-view.active #toolbar-wrapper {
            position: fixed;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #whiteboard-view.active #toolbar-wrapper.toolbar-dock-top,
        #whiteboard-view.active #toolbar-wrapper.toolbar-dock-bottom {
            left: 50%;
            transform: translateX(-50%);
        }

        #whiteboard-view.active #toolbar-wrapper.toolbar-dock-top {
            top: 16px;
        }

        #whiteboard-view.active #toolbar-wrapper.toolbar-dock-bottom {
            bottom: 16px;
        }

        #whiteboard-view.active #toolbar-wrapper.toolbar-dock-left,
        #whiteboard-view.active #toolbar-wrapper.toolbar-dock-right {
            top: 50%;
            justify-content: flex-start;
            transform: translateY(-50%);
        }

        #whiteboard-view.active #toolbar-wrapper.toolbar-dock-left {
            left: 16px;
        }

        #whiteboard-view.active #toolbar-wrapper.toolbar-dock-right {
            right: 16px;
        }

        #whiteboard-view.active #toolbar {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 16px;
            box-shadow: 0 12px 30px -12px rgba(15, 23, 42, 0.35);
            padding: 10px;
            gap: 0.5rem;
            width: max-content;
            max-width: min(95vw, 1100px);
        }

        #whiteboard-view.active .toolbar-dock-left #toolbar,
        #whiteboard-view.active .toolbar-dock-right #toolbar {
            flex-direction: column;
            align-items: stretch;
            width: auto;
            max-width: min(20rem, calc(100vw - 32px));
            max-height: min(86vh, calc(100vh - 32px));
            overflow-y: auto;
            overflow-x: hidden;
        }

        #whiteboard-view.active .toolbar-dock-top #toolbar,
        #whiteboard-view.active .toolbar-dock-bottom #toolbar {
            flex-direction: row;
            align-items: flex-start;
            overflow-x: auto;
            overflow-y: hidden;
        }

        #whiteboard-view.active .toolbar-dock-bottom #toolbar {
            box-shadow: 0 -12px 30px -12px rgba(15, 23, 42, 0.35);
        }

        #whiteboard-view.active .toolbar-dock-left #toolbar,
        #whiteboard-view.active .toolbar-dock-right #toolbar {
            padding: 12px 8px;
        }

        #whiteboard-view.active .toolbar-dock-left .tool-group,
        #whiteboard-view.active .toolbar-dock-right .tool-group {
            min-width: 0;
            width: 100%;
        }

        #whiteboard-view.active .toolbar-dock-left .tool-group .tool-meta,
        #whiteboard-view.active .toolbar-dock-right .tool-group .tool-meta {
            justify-content: center;
        }

        #whiteboard-view.active .toolbar-dock-left .tool-group .tool-btn,
        #whiteboard-view.active .toolbar-dock-right .tool-group .tool-btn {
            width: 100%;
        }

        .toolbar-drag-handle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border: 1px solid transparent;
            border-radius: 999px;
            background: transparent;
            color: #64748b;
            cursor: grab;
            touch-action: none;
        }

        .toolbar-drag-handle:active {
            cursor: grabbing;
            background: rgba(226, 232, 240, 0.6);
        }

        .tool-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            min-width: 3.1rem;
        }

        .tool-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #334155;
            line-height: 1;
        }

        .tool-shortcut {
            font-size: 0.65rem;
            color: #64748b;
            line-height: 1;
        }

        .tool-meta {
            display: flex;
            gap: 0.25rem;
            align-items: center;
            justify-content: center;
            min-height: 1rem;
        }

        .tool-action {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .tool-action::after {
            content: '';
            position: absolute;
            inset: -0.35rem;
            border-radius: 0.75rem;
        }

        .tool-action:focus-visible,
        .toolbar-drag-handle:focus-visible,
        .text-input-toolbar button:focus-visible,
        .triangle-option:focus-visible {
            outline: 2px solid #2563eb;
            outline-offset: 2px;
        }
        
        /* Homepage view - hide whiteboard specific floating containers */
        #homepage-view.active .header-logo-container,
        #homepage-view.active .header-center-container,
        #homepage-view.active .header-account-container {
            display: flex;
        }
        
        #homepage-view.active #whiteboard-view .header-logo-container,
        #homepage-view.active #whiteboard-view .header-account-container {
            display: none;
        }
        
        /* Mobile responsive */
        @media (max-width: 768px) {
            .header-center-container {
                display: none;
            }
            
            .header-logo-container span {
                display: none;
            }
            
            .boards-grid {
                grid-template-columns: 1fr;
            }
        }
        /* The canvas itself */
        #whiteboard {
            display: block;
            /* Changed from 'none' to 'crosshair' so cursor is visible if JS fails */
            cursor: crosshair; 
            touch-action: none; /* Disables browser gestures like double-tap-to-zoom */
        }
        
        #whiteboard.panning {
            cursor: grab;
        }

        #whiteboard.panning:active {
            cursor: grabbing;
        }

        #custom-cursor-circle {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            background-color: transparent; 
            border: 1px solid rgba(0,0,0,0.5); 
            border-radius: 50%;
            pointer-events: none; 
            transform: translate(-50%, -50%);
            z-index: 9999;
            transition: width 0.1s ease, height 0.1s ease;
            display: none; 
            box-shadow: 0 0 0 1px rgba(255,255,255,0.5); /* Inner contrast ring */
        }
        
        #custom-cursor-eraser {
            position: fixed;
            top: 0;
            left: 0;
            width: 24px;
            height: 24px;
            pointer-events: none;
            transform: translate(-4px, -22px); 
            z-index: 9999;
            display: none; 
            filter: drop-shadow(0px 1px 2px rgba(0,0,0,0.3));
        }
        
        #custom-cursor-eraser svg {
            width: 100%;
            height: 100%;
            fill: white; 
            stroke: #333;
            stroke-width: 1.5;
        }

        #whiteboard.panning + #custom-cursor-circle,
        #whiteboard.panning + #custom-cursor-eraser {
            display: none;
        }

        #save-indicator {
            transition: opacity 0.5s ease-out;
            background-color: #16a34a; /* green-600 */
        }
        
        /* Custom color input */
        input[type="color"] {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 100%; 
            height: 40px; 
            padding: 0;
            border: none;
            border-radius: 0.375rem; 
            cursor: pointer;
            background-color: transparent;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
            border-radius: 0.375rem;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid #e2e8f0; 
            border-radius: 0.375rem;
        }
        input[type="color"]::-moz-color-swatch {
            border: 2px solid #e2e8f0;
            border-radius: 0.375rem;
        }

        .tool-btn.active {
            background-color: #dbeafe; /* blue-100 */
            color: #2563eb; /* blue-600 */
            box-shadow: 0 0 0 2px #bfdbfe; /* blue-200 */
        }

        .tool-btn {
            padding: 0.75rem; /* p-3 */
            border-radius: 0.5rem; /* rounded-md */
        }
        .tool-btn svg {
            width: 1.75rem; /* w-7 */
            height: 1.75rem; /* h-7 */
            pointer-events: none;
        }
        
        .tool-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background-color: transparent;
            color: currentColor;
            box-shadow: none;
        }

        /* NEW: Popover styles */
        .popover {
            display: none; 
            position: fixed; 
            background-color: white;
            border-radius: 0.5rem; 
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            padding: 1rem; 
            z-index: 20;
            width: 280px; 
            overflow-y: auto;
            max-height: 70vh; 
        }
        
        .popover.active {
            display: block;
        }
        
        /* Custom Scrollbar for Popovers */
        .popover::-webkit-scrollbar {
            width: 8px;
        }
        .popover::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 10px;
        }
        .popover::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        .popover::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        /* Styles for thickness input */
        .thickness-control {
            display: flex;
            align-items: center;
            gap: 0.5rem; 
        }
        .thickness-control input[type="number"] {
            width: 4rem; 
            text-align: center;
            border: 1px solid #d1d5db; 
            border-radius: 0.375rem; 
            padding: 0.25rem 0.5rem; 
            -moz-appearance: textfield; 
        }
        .thickness-control input[type="number"]::-webkit-outer-spin-button,
        .thickness-control input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none; 
            margin: 0;
        }
        .thickness-control button {
            width: 2rem; 
            height: 2rem; 
            font-size: 1.25rem; 
            font-weight: 600; 
            border: 1px solid #d1d5db; 
            border-radius: 0.375rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f9fafb; 
            color: #374151; 
        }
        .thickness-control button:hover {
            background-color: #f3f4f6; 
        }

        /* Toolbar and tool transitions */
        #toolbar, .tool-btn, .tool-btn svg, .toolbar-drag-handle, .tool-group, .tool-label, .tool-shortcut {
            transition: all 0.15s ease-in-out;
        }
        
        /* Custom scrollbar for toolbar */
        #toolbar::-webkit-scrollbar {
            height: 4px; 
        }
        #toolbar::-webkit-scrollbar-track {
            background: transparent;
        }
        #toolbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        #toolbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        /* Preview box styles */
        .preview-box {
            width: 100%;
            height: 60px;
            background-color: #f3f4f6; 
            border: 1px solid #e5e7eb; 
            border-radius: 0.375rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #pen-preview {
            width: 100%;
            height: 5px; 
            background-color: #000;
            border-radius: 99px;
            transition: height 0.1s ease;
        }
        #eraser-preview {
            width: 20px; 
            height: 20px; 
            background-color: #9ca3af; 
            border-radius: 50%;
            transition: all 0.1s ease;
        }
        
        /* Text tool styles - floating transparent editor */
        .text-input-overlay {
            position: fixed;
            display: none;
            z-index: 10000;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(37, 99, 235, 0.4);
            border-radius: 14px;
            box-shadow: 0 20px 35px rgba(15, 23, 42, 0.18);
            min-width: 240px;
            min-height: 160px;
            max-width: min(560px, calc(100vw - 24px));
            max-height: min(420px, calc(100vh - 24px));
            resize: both;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .text-input-overlay.active {
            display: flex;
        }
        
        .text-input-toolbar {
            display: flex;
            gap: 4px;
            padding: 6px;
            background: rgba(248, 250, 252, 0.9);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 13px 13px 0 0;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-start;
        }
        
        .text-input-toolbar button,
        .text-input-toolbar select {
            padding: 4px 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .text-input-toolbar button:hover {
            background: #e5e7eb;
        }
        
        .text-input-toolbar button.active {
            background: #dbeafe;
            border-color: #2563eb;
            color: #2563eb;
        }
        
        .text-editor-surface {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        .text-input-overlay.toolbar-below {
            flex-direction: column-reverse;
        }

        .text-input-overlay.toolbar-below .text-input-toolbar {
            border-top: 1px solid rgba(226, 232, 240, 0.8);
            border-bottom: none;
